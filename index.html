<!DOCTYPE html>
<html lang="ru" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#0f0f0f">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="Volvo Journal">
<title>Сервисный журнал</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
html{transition:background .3s,color .3s;-webkit-text-size-adjust:100%}

/* ═══════════ ТЕМЫ ═══════════ */
[data-theme="dark"]{
  --bg:#0f0f0f;--bg2:#141210;--card:#1a1816;--card2:#211f1c;--border:#2e2b26;
  --text:#e8e0d0;--muted:#8a8070;--gold:#B8922A;--gold-l:#D4A843;
  --accent:#B8922A;--accent-l:#D4A843;--accent-bg:rgba(184,146,42,0.08);
  --header-bg:linear-gradient(135deg,#1a1610 0%,#0f0d0a 60%,#1a1410 100%);
  --dash-bg:linear-gradient(160deg,#1a1610 0%,#0f0d0b 50%,#161210 100%);
  --shadow:rgba(0,0,0,0.5);--badge-to-bg:rgba(184,146,42,0.13);--badge-to-c:#D4A843;
  --badge-rem-bg:rgba(192,57,43,0.13);--badge-rem-c:#e74c3c;
  --badge-oth-bg:rgba(41,128,185,0.13);--badge-oth-c:#5dade2;
  --sync-bg:rgba(184,146,42,0.07);--input-border:#2e2b26;
}
[data-theme="light"]{
  --bg:#f4f2ee;--bg2:#ece9e3;--card:#ffffff;--card2:#f8f6f2;--border:#ddd8ce;
  --text:#2a2520;--muted:#9a8e7e;--gold:#9a7820;--gold-l:#B8922A;
  --accent:#9a7820;--accent-l:#B8922A;--accent-bg:rgba(154,120,32,0.07);
  --header-bg:linear-gradient(135deg,#fffbf2 0%,#f5efe0 60%,#fdf8ee 100%);
  --dash-bg:linear-gradient(160deg,#fffcf5 0%,#f5efe0 50%,#fdf9f0 100%);
  --shadow:rgba(0,0,0,0.12);--badge-to-bg:rgba(154,120,32,0.1);--badge-to-c:#9a7820;
  --badge-rem-bg:rgba(192,57,43,0.1);--badge-rem-c:#c0392b;
  --badge-oth-bg:rgba(41,128,185,0.1);--badge-oth-c:#2980b9;
  --sync-bg:rgba(154,120,32,0.07);--input-border:#ddd8ce;
}
[data-theme="volvo"]{
  --bg:#0a1628;--bg2:#0d1c35;--card:#112240;--card2:#0d1c35;--border:#1e3a5f;
  --text:#e8f0ff;--muted:#6a8ab0;--gold:#4a9fd4;--gold-l:#6ab8e8;
  --accent:#003d82;--accent-l:#0057b8;--accent-bg:rgba(74,159,212,0.1);
  --header-bg:linear-gradient(135deg,#0d1f3c 0%,#071428 60%,#0a1a32 100%);
  --dash-bg:linear-gradient(160deg,#0d2040 0%,#071428 50%,#0a1830 100%);
  --shadow:rgba(0,0,0,0.6);--badge-to-bg:rgba(74,159,212,0.15);--badge-to-c:#6ab8e8;
  --badge-rem-bg:rgba(192,57,43,0.15);--badge-rem-c:#e74c3c;
  --badge-oth-bg:rgba(74,159,212,0.1);--badge-oth-c:#4a9fd4;
  --sync-bg:rgba(74,159,212,0.07);--input-border:#1e3a5f;
}

body{background:var(--bg);color:var(--text);font-family:'Inter',system-ui,sans-serif;font-size:14px;line-height:1.5;min-height:100vh;padding-bottom:80px;transition:background .3s,color .3s;-webkit-font-smoothing:antialiased}
input,select,textarea,button{font-family:'Inter',system-ui,sans-serif;transition:background .3s,color .3s,border-color .3s}
button{cursor:pointer}
.mono{font-family:'JetBrains Mono',monospace!important}

/* ═══════════ PULL TO REFRESH ═══════════ */
.ptr{position:fixed;top:0;left:0;right:0;z-index:500;display:flex;align-items:center;justify-content:center;gap:10px;background:var(--card);border-bottom:1px solid var(--border);padding:0 16px;height:0;overflow:hidden;transition:height .2s ease;opacity:0}
.ptr.visible{opacity:1}
.ptr-spinner{width:18px;height:18px;border:2px solid var(--border);border-top-color:var(--gold);border-radius:50%;flex-shrink:0}
.ptr-spinner.spin{animation:sp .7s linear infinite}
.ptr-text{font-size:12px;font-weight:500;color:var(--muted);white-space:nowrap}

/* Сдвиг страницы при pull */
body.ptr-pulling{transition:transform .1s}

/* Только на мобильном */
@media(min-width:768px){.ptr{display:none!important}}
.sync-bar{text-align:center;padding:5px;font-size:10px;font-weight:500;background:var(--sync-bg);border-bottom:1px solid var(--border);letter-spacing:1px;color:var(--muted)}
.sync-bar.err{background:rgba(192,57,43,0.1);color:#e74c3c}

/* ═══════════ DASHBOARD ═══════════ */
.dashboard{background:var(--dash-bg);border-bottom:2px solid var(--border);padding:clamp(20px,4vw,32px) clamp(16px,4vw,32px) clamp(18px,3vw,28px);position:relative;overflow:hidden}
.dash-deco{position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,transparent,var(--gold),var(--gold-l),var(--gold),transparent)}
.dash-deco2{position:absolute;bottom:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--border),transparent)}

.car-name-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;gap:12px}
.car-name{font-size:clamp(22px,5vw,34px);font-weight:700;color:var(--gold-l);letter-spacing:1px;line-height:1.1}
.car-year{font-size:13px;font-weight:400;color:var(--muted);letter-spacing:.5px;margin-top:3px}
.car-plate{display:inline-flex;align-items:center;gap:6px;background:var(--card);border:1px solid var(--border);border-radius:6px;padding:4px 12px;font-size:13px;font-weight:600;letter-spacing:2px;color:var(--text);margin-top:8px;margin-bottom:16px}
.car-plate-flag{font-size:15px}

/* KPI */
.kpi-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:16px}
@media(max-width:640px){.kpi-grid{grid-template-columns:1fr 1fr}}
@media(max-width:360px){.kpi-grid{grid-template-columns:1fr}}
.kpi{background:var(--accent-bg);border:1px solid var(--border);border-radius:10px;padding:12px 14px;position:relative;overflow:hidden}
.kpi.warn{border-color:rgba(231,76,60,0.4);background:rgba(231,76,60,0.07)}
.kpi.ok{border-color:rgba(46,204,113,0.3);background:rgba(46,204,113,0.05)}
.kpi-label{font-size:9px;font-weight:600;color:var(--muted);letter-spacing:1.2px;text-transform:uppercase;margin-bottom:5px}
.kpi-value{font-size:clamp(15px,3vw,20px);font-weight:700;color:var(--gold-l);line-height:1.1}
.kpi-value.warn{color:#e74c3c}
.kpi-value.ok{color:#2ecc71}
.kpi-sub{font-size:11px;font-weight:400;color:var(--muted);margin-top:4px}

/* Прогресс-бар ТО */
.to-progress{margin-top:6px;height:4px;background:var(--border);border-radius:2px;overflow:hidden}
.to-progress-fill{height:100%;border-radius:2px;transition:width .5s ease}

/* Данные авто */
.car-details-toggle{display:flex;align-items:center;gap:8px;cursor:pointer;user-select:none;padding:10px 0;border-top:1px solid var(--border);margin-top:4px}
.car-details-label{font-size:10px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted)}
.car-details-chev{color:var(--muted);font-size:14px;transition:transform .2s;margin-left:auto}
.car-details-chev.open{transform:rotate(180deg)}
.car-details{display:none;padding-top:12px}
.car-details.open{display:block}
.car-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:8px}
@media(max-width:480px){.car-grid{grid-template-columns:1fr 1fr}}
.cf{background:var(--accent-bg);border:1px solid var(--border);border-radius:8px;padding:8px 12px}
.cl{font-size:9px;font-weight:600;color:var(--muted);letter-spacing:1.2px;text-transform:uppercase;margin-bottom:3px}
.cv{font-size:13px;font-weight:400;color:var(--text)}
.cv.mono{font-family:'JetBrains Mono',monospace;letter-spacing:.5px;font-size:11px;cursor:text;user-select:all}
.cv.mono:hover{color:var(--gold-l)}
.copy-hint{font-size:9px;color:var(--muted);margin-top:2px}

/* ═══════════ MAIN ═══════════ */
.main{max-width:960px;margin:0 auto;padding:20px clamp(12px,3vw,24px) 0}

/* ═══════════ TOOLBAR ═══════════ */
.toolbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;flex-wrap:wrap;gap:8px}
.stitle{font-size:10px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:var(--muted)}
.tbtns{display:flex;gap:8px;flex-wrap:wrap}

/* ═══════════ DROPDOWN ═══════════ */
.dd{position:relative}
.dbtn{background:none;border:1px solid var(--border);border-radius:6px;color:var(--muted);font-size:12px;font-weight:500;padding:7px 14px;letter-spacing:.3px;white-space:nowrap}
.dbtn.accent{background:var(--accent-bg);border-color:rgba(184,146,42,.35);color:var(--gold-l)}
[data-theme="volvo"] .dbtn.accent{border-color:rgba(74,159,212,.35);color:var(--gold-l)}
.dbtn:hover{border-color:var(--gold);color:var(--gold-l)}
.dmenu{position:absolute;right:0;top:calc(100% + 6px);z-index:100;background:var(--card);border:1px solid var(--border);border-radius:10px;min-width:185px;box-shadow:0 8px 32px var(--shadow);overflow:hidden;display:none}
.dmenu.open{display:block}
.ditem{display:flex;align-items:center;gap:10px;width:100%;background:none;border:none;border-bottom:1px solid var(--border);color:var(--text);padding:11px 16px;font-size:13px;font-weight:400;text-align:left;cursor:pointer}
.ditem:hover{background:var(--accent-bg)}
.ditem label{display:flex;align-items:center;gap:10px;cursor:pointer;width:100%}
.dnote{padding:8px 16px;font-size:10px;color:var(--muted);border-top:1px solid var(--border)}
.ov{position:fixed;inset:0;z-index:99;display:none}.ov.open{display:block}

/* ═══════════ ADD BTN ═══════════ */
.add-btn{display:flex;align-items:center;gap:8px;background:var(--accent-bg);border:1px solid var(--gold);border-radius:10px;color:var(--gold-l);padding:11px 20px;font-size:14px;font-weight:600;letter-spacing:.3px;margin-bottom:16px;width:100%;justify-content:center}
.add-btn:hover{opacity:.85}

/* ═══════════ RECORD CARD ═══════════ */
.rc{background:var(--card);border:1px solid var(--border);border-radius:12px;margin-bottom:12px;overflow:hidden}
.rh{display:flex;justify-content:space-between;align-items:center;padding:13px 16px;cursor:pointer;user-select:none;border-bottom:1px solid transparent;gap:8px}
.rh.open{border-bottom:1px solid var(--border);background:var(--accent-bg)}
.rh:hover{background:var(--accent-bg)}
.rb{padding:16px 16px 18px;display:none}.rb.open{display:block}
.badge{display:inline-block;padding:3px 10px;border-radius:20px;font-size:10px;font-weight:700;letter-spacing:.8px;white-space:nowrap}
.bto{background:var(--badge-to-bg);color:var(--badge-to-c);border:1px solid var(--badge-to-c)44}
.brem{background:var(--badge-rem-bg);color:var(--badge-rem-c);border:1px solid var(--badge-rem-c)44}
.both{background:var(--badge-oth-bg);color:var(--badge-oth-c);border:1px solid var(--badge-oth-c)44}
.chev{color:var(--muted);font-size:18px;transition:transform .2s;flex-shrink:0}.chev.open{transform:rotate(180deg)}
.rh-left{display:flex;align-items:center;gap:10px;flex-wrap:wrap;min-width:0}
.rh-right{display:flex;align-items:center;gap:12px;flex-shrink:0}
.rh-mil{font-size:15px;font-weight:700;color:var(--text);white-space:nowrap}
.rh-date{font-size:12px;font-weight:400;color:var(--muted);white-space:nowrap}
.rh-status{font-size:10px;font-weight:500;white-space:nowrap}
.rh-total{font-size:13px;font-weight:600;color:var(--gold-l);white-space:nowrap}

/* ═══════════ FORM ═══════════ */
.fg{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin-bottom:20px}
@media(max-width:580px){.fg{grid-template-columns:1fr 1fr}}
@media(max-width:360px){.fg{grid-template-columns:1fr}}
.fl{font-size:10px;font-weight:600;color:var(--muted);letter-spacing:.8px;text-transform:uppercase;margin-bottom:5px;display:block}
.fi{background:var(--card2);border:1px solid var(--input-border);border-radius:7px;color:var(--text);padding:8px 11px;font-size:13px;font-weight:400;width:100%;outline:none}
.fi:focus{border-color:var(--gold);box-shadow:0 0 0 2px var(--gold)22}
.fs{background:var(--card2);border:1px solid var(--input-border);border-radius:7px;color:var(--text);padding:8px 11px;font-size:13px;font-weight:400;outline:none;width:100%}
.fs:focus{border-color:var(--gold);box-shadow:0 0 0 2px var(--gold)22}
.fta{background:var(--card2);border:1px solid var(--input-border);border-radius:7px;color:var(--text);padding:9px 12px;font-size:13px;font-weight:400;width:100%;resize:vertical;outline:none;min-height:70px;font-family:'Inter',sans-serif;line-height:1.5}
.fta:focus{border-color:var(--gold);box-shadow:0 0 0 2px var(--gold)22}

/* ═══════════ SECTION LABEL ═══════════ */
.sl{font-size:10px;font-weight:700;color:var(--gold);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:10px;display:flex;align-items:center;gap:8px}
.sb{width:3px;height:13px;background:var(--gold);display:inline-block;border-radius:2px;flex-shrink:0}

/* ═══════════ TABLE ═══════════ */
.tw{overflow-x:auto;margin-bottom:14px;-webkit-overflow-scrolling:touch}
table{width:100%;border-collapse:collapse;font-size:13px}
th{background:var(--bg2);color:var(--muted);padding:7px 8px;text-align:left;font-size:9px;font-weight:700;letter-spacing:1px;text-transform:uppercase;border-bottom:1px solid var(--border);white-space:nowrap;overflow:hidden}
th.gold{color:var(--gold-l)}
td{padding:8px 6px;border-bottom:1px solid var(--border)33;vertical-align:top}
.tdi{background:transparent;border:none;color:var(--text);padding:0;font-size:13px;font-weight:400;width:100%;outline:none;resize:none;overflow:hidden;display:block;line-height:1.4}
.tdi:focus{color:var(--gold-l)}
.tdi-name{word-break:break-word;white-space:pre-wrap;vertical-align:middle}
.tdt{text-align:right;color:var(--gold-l);font-weight:700;font-size:13px;padding-right:6px;white-space:nowrap;vertical-align:middle}
.ib{background:none;border:none;color:var(--muted);font-size:15px;padding:4px 4px;border-radius:4px;min-width:26px;min-height:26px;display:block}
.ib:hover{color:#e74c3c}

/* ПК — широкая колонка наименования, текст в одну строку */
@media(min-width:768px){
  table{table-layout:fixed}
  td:first-child,th:first-child{width:30%;min-width:240px}
  .tdi-name{white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .tdi-name:focus{white-space:pre-wrap;overflow:visible;text-overflow:unset;height:auto}
}

/* Мобильный — все ячейки выровнены по высоте наименования */
@media(max-width:767px){
  table{table-layout:fixed;width:100%}
  /* Пропорции колонок */
  td:first-child,th:first-child{width:32%}
  td:nth-child(2),th:nth-child(2){width:18%}
  td:nth-child(3),th:nth-child(3){width:20%}
  td:nth-child(4),th:nth-child(4){width:10%;text-align:center}
  td:nth-child(5),th:nth-child(5){width:14%;text-align:right}
  td:nth-child(6),th:nth-child(6){width:14%;text-align:right}
  td:last-child,th:last-child{width:6%}
  /* Все ячейки по верхней грани */
  td{vertical-align:top;padding:8px 4px}
  .tdi{font-size:11px;text-align:inherit}
  th{font-size:7px;padding:6px 4px;letter-spacing:.5px}
  .tdi-name{white-space:pre-wrap;word-break:break-word}
  /* Колонки с числами — по центру */
  td:nth-child(4) .tdi{text-align:center}
  td:nth-child(5) .tdi{text-align:right}
}
.smb{background:none;border:1px solid var(--border);border-radius:6px;color:var(--muted);font-size:11px;font-weight:500;padding:5px 14px;margin-top:6px;letter-spacing:.3px}
.smb:hover{border-color:var(--gold);color:var(--gold-l)}
.tsum{text-align:right;margin-top:5px;font-size:12px;font-weight:400;color:var(--muted)}.tsum span{color:var(--gold-l);font-weight:700}

/* ═══════════ TOTALS ═══════════ */
.trow{display:flex;justify-content:flex-end;gap:20px;margin-top:8px;padding:10px 0 0;border-top:1px solid var(--border);flex-wrap:wrap}
.tlbl{color:var(--muted);font-size:12px;font-weight:400}.tval{color:var(--gold-l);font-weight:700;font-size:14px}

/* ═══════════ BUTTONS ═══════════ */
.btn-row{display:flex;flex-wrap:wrap;gap:8px;margin-top:14px}
.svbtn{background:linear-gradient(135deg,var(--gold),var(--gold-l));border:none;border-radius:8px;color:#0f0d0a;font-weight:700;font-size:13px;padding:9px 22px;letter-spacing:.3px;flex-shrink:0}
.svbtn:hover{opacity:.9}
.dupbtn{background:none;border:1px solid var(--border);border-radius:8px;color:var(--muted);font-size:12px;font-weight:500;padding:9px 16px;letter-spacing:.3px}
.dupbtn:hover{border-color:var(--gold);color:var(--gold-l)}
.dlbtn{background:none;border:1px solid rgba(192,57,43,.3);border-radius:8px;color:rgba(231,76,60,.6);font-size:12px;font-weight:500;padding:9px 16px;letter-spacing:.3px;margin-left:auto}
.dlbtn:hover{color:#e74c3c;border-color:rgba(192,57,43,.7)}

/* ═══════════ TOAST ═══════════ */
.toast{position:fixed;bottom:80px;right:16px;background:var(--gold);color:#0f0d0a;font-weight:700;padding:10px 18px;border-radius:8px;font-size:13px;z-index:9999;box-shadow:0 4px 20px var(--shadow);opacity:0;transition:opacity .3s;pointer-events:none}
.toast.show{opacity:1}
@media(min-width:768px){.toast{bottom:24px;right:24px}}

/* ═══════════ SEARCH ═══════════ */
.search-wrap{margin-bottom:14px}
.search-input-wrap{position:relative;display:flex;align-items:center;margin-bottom:10px}
.search-icon{position:absolute;left:11px;font-size:14px;color:var(--muted);pointer-events:none}
.search-input{width:100%;background:var(--card);border:1px solid var(--border);border-radius:9px;color:var(--text);padding:9px 36px 9px 34px;font-size:13px;font-weight:400;outline:none;font-family:'Inter',sans-serif}
.search-input:focus{border-color:var(--gold);box-shadow:0 0 0 2px var(--gold)18}
.search-input::placeholder{color:var(--muted)}
.search-clear{position:absolute;right:8px;background:none;border:none;color:var(--muted);font-size:14px;padding:4px 6px;cursor:pointer;line-height:1}
.search-clear:hover{color:var(--text)}
.filter-types{display:flex;gap:6px;flex-wrap:wrap}
.ftype{background:none;border:1px solid var(--border);border-radius:20px;color:var(--muted);font-size:11px;font-weight:500;padding:5px 13px;cursor:pointer;transition:all .15s;white-space:nowrap}
.ftype:hover{border-color:var(--gold);color:var(--gold-l)}
.ftype.active{background:var(--accent-bg);border-color:var(--gold);color:var(--gold-l);font-weight:600}
.search-empty{text-align:center;padding:32px 16px;color:var(--muted);font-size:13px}
.search-empty-icon{font-size:32px;margin-bottom:8px}
tr.hl-row td{background:rgba(212,168,67,0.08);border-bottom-color:rgba(212,168,67,0.2)}
tr.hl-row td:first-child{border-left:2px solid var(--gold)}

/* ═══════════ EMPTY ═══════════ */
.empty{text-align:center;padding:48px 24px;color:var(--muted);border-top:1px solid var(--border)}

/* ═══════════ LOADING ═══════════ */
.loading{text-align:center;padding:60px 24px;color:var(--muted)}
.spin{display:inline-block;width:24px;height:24px;border:2px solid var(--border);border-top-color:var(--gold);border-radius:50%;animation:sp .8s linear infinite;margin-bottom:12px}
@keyframes sp{to{transform:rotate(360deg)}}

/* ═══════════ SETTINGS MODAL ═══════════ */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:1000;display:none;align-items:flex-end;justify-content:center;padding:0}
.modal-overlay.open{display:flex}
@media(min-width:600px){.modal-overlay{align-items:center;padding:16px}}
.modal{background:var(--card);border:1px solid var(--border);border-radius:20px 20px 0 0;width:100%;max-width:100%;max-height:92vh;overflow-y:auto;box-shadow:0 -8px 40px var(--shadow)}
@media(min-width:600px){.modal{border-radius:16px;max-width:540px;max-height:90vh}}
.modal-header{display:flex;justify-content:space-between;align-items:center;padding:18px 20px 14px;border-bottom:1px solid var(--border);position:sticky;top:0;background:var(--card);z-index:1}
.modal-title{font-size:16px;font-weight:700;color:var(--text);letter-spacing:.3px}
.modal-close{background:none;border:none;color:var(--muted);font-size:20px;padding:4px 8px;border-radius:6px;line-height:1}
.modal-close:hover{color:var(--text)}
.modal-body{padding:18px 20px}
.settings-section{margin-bottom:22px}
.settings-section-title{font-size:9px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--gold);margin-bottom:12px;padding-bottom:6px;border-bottom:1px solid var(--border)}
.settings-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px}
.settings-row.full{grid-template-columns:1fr}
@media(max-width:400px){.settings-row{grid-template-columns:1fr}}
.sf{background:var(--card2);border:1px solid var(--input-border);border-radius:7px;color:var(--text);padding:9px 12px;font-size:13px;font-weight:400;width:100%;outline:none}
.sf:focus{border-color:var(--gold);box-shadow:0 0 0 2px var(--gold)22}
.slabel{font-size:9px;font-weight:600;color:var(--muted);letter-spacing:1px;text-transform:uppercase;margin-bottom:4px;display:block}

/* Тема */
.theme-picker{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:4px}
.theme-opt{border:2px solid var(--border);border-radius:10px;padding:10px 6px;cursor:pointer;text-align:center;transition:border-color .2s}
.theme-opt.active{border-color:var(--gold)}
.theme-opt:hover{border-color:var(--gold-l)}
.theme-preview{height:26px;border-radius:6px;margin-bottom:6px}
.theme-name{font-size:11px;font-weight:500;color:var(--text)}

/* Период */
.period-picker{display:flex;gap:6px;flex-wrap:wrap;margin-top:4px}
.period-opt{background:none;border:1px solid var(--border);border-radius:20px;color:var(--muted);font-size:11px;font-weight:500;padding:5px 14px;cursor:pointer;transition:all .2s;white-space:nowrap}
.period-opt.active{background:var(--accent-bg);border-color:var(--gold);color:var(--gold-l)}

.save-settings-btn{background:linear-gradient(135deg,var(--gold),var(--gold-l));border:none;border-radius:9px;color:#0f0d0a;font-weight:700;font-size:14px;padding:12px 28px;width:100%;margin-top:8px;letter-spacing:.3px}
.save-settings-btn:hover{opacity:.9}

/* ═══════════ BOTTOM NAV ═══════════ */
.bottom-nav{position:fixed;bottom:0;left:0;right:0;background:var(--card);border-top:1px solid var(--border);display:flex;z-index:200;box-shadow:0 -4px 20px var(--shadow);padding-bottom:env(safe-area-inset-bottom)}
.bnav-btn{flex:1;background:none;border:none;color:var(--muted);padding:10px 4px 10px;font-size:10px;font-weight:500;letter-spacing:.4px;display:flex;flex-direction:column;align-items:center;gap:3px;transition:color .2s;min-height:52px}
.bnav-btn:hover,.bnav-btn.active{color:var(--gold-l)}
.bnav-icon{font-size:19px;line-height:1}

/* ═══════════ PC TWEAKS ═══════════ */
@media(min-width:768px){
  body{padding-bottom:72px}
  .dashboard{padding:32px clamp(24px,4vw,48px) 28px}
  .main{padding:24px clamp(24px,4vw,48px) 0}
  .bottom-nav{max-width:100%;justify-content:center;gap:0}
  .bnav-btn{max-width:160px}
}

<script>
const SU='https://rfzxpfwmgmzcvvdpiijl.supabase.co',SK='sb_publishable_Z8puthq7rLhFsHZdC8yZhw_lOzncTM_';

// ── SUPABASE ──────────────────────────────────────────────────────
async function sf(path,o={}){
  const r=await fetch(SU+'/rest/v1/'+path,{headers:{'apikey':SK,'Authorization':'Bearer '+SK,'Content-Type':'application/json','Prefer':'return=representation',...(o.headers||{})},...o});
  if(!r.ok){const e=await r.text();throw new Error(r.status+': '+e);}const t=await r.text();return t?JSON.parse(t):null;
}
async function dbLoad(){const rows=await sf('records?select=id,data&order=id.desc');return rows.map(r=>({...r.data,_dbId:r.id}));}
async function dbSave(rec){
  const {_dbId,_open,_saving,_unsaved,...data}=rec;
  if(_dbId){await sf('records?id=eq.'+_dbId,{method:'PATCH',body:JSON.stringify({data,updated_at:new Date().toISOString()})});}
  else{const res=await sf('records',{method:'POST',body:JSON.stringify({data,updated_at:new Date().toISOString()})});return res[0].id;}
}
async function dbDel(id){await sf('records?id=eq.'+id,{method:'DELETE'});}

// ── STATE ─────────────────────────────────────────────────────────
let R=[],T={};
let CFG={
  make:'Volvo',model:'S60',year:'2004',plate:'',vin:'YV1RS61S942356411',
  engine:'B5244S',gearbox:'',color:'Maya Gold Metallic',colorcode:'446-46',
  osago:'',toInterval:10000,period:'calendar',theme:'dark'
};

// ── HELPERS ───────────────────────────────────────────────────────
const nP=()=>({id:Date.now()+Math.random(),name:'',brand:'',article:'',qty:1,price:''});
const nW=()=>({id:Date.now()+Math.random(),name:'',qty:1,price:''});
const nR=()=>({id:Date.now(),type:'\u0422\u041e',mileage:'',date:new Date().toISOString().slice(0,10),parts:[nP()],works:[nW()],recommendations:''});
const sP=p=>p.reduce((s,x)=>s+(parseFloat(x.price)||0)*(parseInt(x.qty)||0),0);
const sW=w=>w.reduce((s,x)=>s+(parseFloat(x.price)||0)*(parseInt(x.qty)||0),0);
const fmt=n=>n>0?n.toLocaleString('ru-RU')+' \u20BD':'—';
const fmtMil=n=>n>0?parseInt(n).toLocaleString('ru-RU')+' \u043a\u043c':'—';
const esc=s=>(s||'').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;');
const gr=id=>R.find(r=>r.id===id);
let tT;
function toast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');clearTimeout(tT);tT=setTimeout(()=>t.classList.remove('show'),2500);}
function sb(m,e=false){const b=document.getElementById('sbar');b.textContent=m;b.className='sync-bar'+(e?' err':'');}

async function dbLoadCFG(){
  try{
    const rows=await sf('settings?key=eq.cfg&select=value');
    if(rows&&rows.length)return{...CFG,...rows[0].value};
  }catch(e){}
  return null;
}
async function dbSaveCFG(){
  try{
    // Используем прямой fetch чтобы точно контролировать заголовки
    const res=await fetch(SU+'/rest/v1/settings',{
      method:'POST',
      headers:{
        'apikey':SK,
        'Authorization':'Bearer '+SK,
        'Content-Type':'application/json',
        'Prefer':'resolution=merge-duplicates,return=representation'
      },
      body:JSON.stringify({key:'cfg',value:CFG,updated_at:new Date().toISOString()})
    });
    if(!res.ok){const e=await res.text();console.error('CFG save error:',e);}
    localStorage.setItem('vj_cfg',JSON.stringify(CFG));
  }catch(e){
    console.error('dbSaveCFG error:',e);
    localStorage.setItem('vj_cfg',JSON.stringify(CFG));
  }
}

// ── SETTINGS ─────────────────────────────────────────────────────
function loadCFGLocal(){
  try{const s=localStorage.getItem('vj_cfg');if(s)CFG={...CFG,...JSON.parse(s)};}catch(e){}
}
// ── CAR SETTINGS (шестерня вверху) ───────────────────────────────
function openCarSettings(){
  cdd();
  document.getElementById('s-make').value=CFG.make||'';
  document.getElementById('s-model').value=CFG.model||'';
  document.getElementById('s-year').value=CFG.year||'';
  document.getElementById('s-plate').value=CFG.plate||'';
  document.getElementById('s-vin').value=CFG.vin||'';
  document.getElementById('s-engine').value=CFG.engine||'';
  document.getElementById('s-gearbox').value=CFG.gearbox||'';
  document.getElementById('s-color').value=CFG.color||'';
  document.getElementById('s-colorcode').value=CFG.colorcode||'';
  document.getElementById('car-settings-modal').classList.add('open');
}
function closeCarSettings(){document.getElementById('car-settings-modal').classList.remove('open');}
async function saveCarSettings(){
  CFG.make=document.getElementById('s-make').value.trim()||'Volvo';
  CFG.model=document.getElementById('s-model').value.trim()||'S60';
  CFG.year=document.getElementById('s-year').value.trim()||'2004';
  CFG.plate=document.getElementById('s-plate').value.trim();
  CFG.vin=document.getElementById('s-vin').value.trim();
  CFG.engine=document.getElementById('s-engine').value.trim();
  CFG.gearbox=document.getElementById('s-gearbox').value.trim();
  CFG.color=document.getElementById('s-color').value.trim();
  CFG.colorcode=document.getElementById('s-colorcode').value.trim();
  closeCarSettings();
  renderDash();
  sb('\u25cf \u0421\u043e\u0445\u0440\u0430\u043d\u0435\u043d\u0438\u0435...');
  await dbSaveCFG();
  sb('\u25cf \u0421\u0438\u043d\u0445\u0440\u043e\u043d\u0438\u0437\u0438\u0440\u043e\u0432\u0430\u043d\u043e \u2713');
  toast('\u0414\u0430\u043d\u043d\u044b\u0435 \u0430\u0432\u0442\u043e \u0441\u043e\u0445\u0440\u0430\u043d\u0435\u043d\u044b \u2713');
}

// ── SYSTEM SETTINGS (ползунки внизу) ─────────────────────────────
function openSettings(){
  cdd();
  document.getElementById('s-toint').value=CFG.toInterval||10000;
  document.getElementById('s-osago').value=CFG.osago||'';
  document.querySelectorAll('.theme-opt').forEach(el=>el.classList.remove('active'));
  const th=document.getElementById('th-'+CFG.theme);if(th)th.classList.add('active');
  document.querySelectorAll('.period-opt').forEach(el=>el.classList.toggle('active',el.dataset.p===String(CFG.period)));
  document.getElementById('settings-modal').classList.add('open');
}
function closeSettings(){document.getElementById('settings-modal').classList.remove('open');}
function setTheme(t){
  CFG.theme=t;
  document.documentElement.setAttribute('data-theme',t);
  document.querySelectorAll('.theme-opt').forEach(el=>el.classList.remove('active'));
  const th=document.getElementById('th-'+t);if(th)th.classList.add('active');
  dbSaveCFG();
}
function setPeriod(p){
  CFG.period=p;
  document.querySelectorAll('.period-opt').forEach(el=>el.classList.toggle('active',el.dataset.p===String(p)));
}
async function saveSettings(){
  CFG.toInterval=parseInt(document.getElementById('s-toint').value)||10000;
  CFG.osago=document.getElementById('s-osago').value;
  closeSettings();
  renderDash();
  sb('\u25cf \u0421\u043e\u0445\u0440\u0430\u043d\u0435\u043d\u0438\u0435...');
  await dbSaveCFG();
  sb('\u25cf \u0421\u0438\u043d\u0445\u0440\u043e\u043d\u0438\u0437\u0438\u0440\u043e\u0432\u0430\u043d\u043e \u2713');
  toast('\u041d\u0430\u0441\u0442\u0440\u043e\u0439\u043a\u0438 \u0441\u043e\u0445\u0440\u0430\u043d\u0435\u043d\u044b \u2713');
}

// ── DASHBOARD ─────────────────────────────────────────────────────
function toggleCarDetails(){
  const d=document.getElementById('car-details');
  const c=document.getElementById('car-det-chev');
  const open=d.classList.toggle('open');
  c.classList.toggle('open',open);
}

function renderDash(){
  // Название (только марка + модель, без года и двигателя)
  document.getElementById('d-carname').textContent=CFG.make+' '+CFG.model;

  // Гос. номер — в шапке рядом с шестерёнкой
  const plateel=document.getElementById('d-plate');
  if(CFG.plate){plateel.style.display='inline-flex';document.getElementById('d-plate-text').textContent=CFG.plate;}
  else plateel.style.display='none';

  // Данные авто — новый порядок: Год → Гос.номер → VIN → Двигатель → Цвет → Коробка
  const cg=document.getElementById('car-grid');
  cg.innerHTML='';
  const fields=[
    {l:'\u0413\u043e\u0434 \u0432\u044b\u043f\u0443\u0441\u043a\u0430',v:CFG.year},
    {l:'\u0413\u043e\u0441. \u043d\u043e\u043c\u0435\u0440',v:CFG.plate||'—'},
    {l:'VIN',v:CFG.vin,mono:true},
    {l:'\u0426\u0432\u0435\u0442 \u043a\u0443\u0437\u043e\u0432\u0430',v:(CFG.colorcode?CFG.colorcode+' ':'')+CFG.color},
    {l:'\u0414\u0432\u0438\u0433\u0430\u0442\u0435\u043b\u044c',v:CFG.engine},
    {l:'\u041a\u043e\u0440\u043e\u0431\u043a\u0430 \u043f\u0435\u0440\u0435\u0434\u0430\u0447',v:CFG.gearbox||'—'},
  ];
  fields.forEach(f=>{
    const el=document.createElement('div');el.className='cf';
    el.innerHTML=`<div class="cl">${f.l}</div><div class="cv${f.mono?' mono':''}">${esc(f.v||'—')}</div>${f.mono?'<div class="copy-hint">\u043d\u0430\u0436\u043c\u0438\u0442\u0435 \u0434\u0432\u0430\u0436\u0434\u044b \u0434\u043b\u044f \u0432\u044b\u0434\u0435\u043b\u0435\u043d\u0438\u044f</div>':''}`;
    cg.appendChild(el);
  });

  // KPI — следующее ТО
  const toEl=document.getElementById('kpi-to');
  const toVal=document.getElementById('kpi-to-val');
  const toSub=document.getElementById('kpi-to-sub');
  const toProg=document.getElementById('kpi-to-prog');
  const toFill=document.getElementById('kpi-to-fill');
  const lastTO=R.filter(r=>r.type==='\u0422\u041e'&&r.mileage).sort((a,b)=>(parseInt(b.mileage)||0)-(parseInt(a.mileage)||0))[0];
  if(lastTO&&CFG.toInterval){
    const lastMil=parseInt(lastTO.mileage)||0;
    const nextMil=lastMil+CFG.toInterval;
    const allMil=R.filter(r=>r.mileage).map(r=>parseInt(r.mileage)||0);
    const curMil=allMil.length?Math.max(...allMil):lastMil;
    const rem=nextMil-curMil;
    toVal.textContent=nextMil.toLocaleString('ru-RU')+' \u043a\u043c';
    toVal.className='kpi-value'+(rem<1000?' warn':rem<3000?' warn':'');
    toSub.textContent=rem>0?'\u041e\u0441\u0442\u0430\u043b\u043e\u0441\u044c: '+rem.toLocaleString('ru-RU')+' \u043a\u043c':'\u041f\u0440\u043e\u0448\u043b\u043e \u0422\u041e!';
    toProg.style.display='';
    const pct=Math.min(100,Math.max(0,((curMil-lastMil)/CFG.toInterval)*100));
    const color=pct>85?'#e74c3c':pct>60?'#f39c12':'#2ecc71';
    toFill.style.width=pct+'%';toFill.style.background=color;
    toEl.className='kpi'+(rem<1000?' warn':rem<0?' warn':'');
  } else {
    toVal.textContent='—';toSub.textContent='\u0414\u043e\u0431\u0430\u0432\u044c\u0442\u0435 \u0437\u0430\u043f\u0438\u0441\u044c \u0422\u041e';toProg.style.display='none';
  }

  // KPI — ОСАГО
  const osEl=document.getElementById('kpi-osago');
  const osVal=document.getElementById('kpi-osago-val');
  const osSub=document.getElementById('kpi-osago-sub');
  if(CFG.osago){
    const d=new Date(CFG.osago),now=new Date();
    const days=Math.round((d-now)/(1000*60*60*24));
    osVal.textContent=d.toLocaleDateString('ru-RU');
    osVal.className='kpi-value'+(days<30?' warn':days<60?' warn':'');
    osSub.textContent=days>0?'\u0427\u0435\u0440\u0435\u0437 '+days+' \u0434\u043d.':'\u041f\u043e\u043b\u0438\u0441 \u0438\u0441\u0442\u0435\u043a!';
    osEl.className='kpi'+(days<30?' warn':days>60?' ok':'');
  } else {osVal.textContent='—';osSub.textContent='';osEl.className='kpi';}

  // KPI — Расходы
  const expVal=document.getElementById('kpi-exp-val');
  const expSub=document.getElementById('kpi-exp-sub');
  const expLbl=document.getElementById('kpi-exp-label');
  const now=new Date();
  let from,lbl;
  if(CFG.period==='calendar'){
    from=new Date(now.getFullYear(),0,1);lbl='\u0420\u0430\u0441\u0445\u043e\u0434\u044b '+now.getFullYear();
  } else {
    const m=parseInt(CFG.period)||12;
    from=new Date(now);from.setMonth(from.getMonth()-m);
    lbl='\u0420\u0430\u0441\u0445\u043e\u0434\u044b \u0437\u0430 '+m+' \u043c\u0435\u0441.';
  }
  expLbl.textContent=lbl;
  const filtered=R.filter(r=>r.date&&new Date(r.date)>=from);
  const total=filtered.reduce((s,r)=>s+sP(r.parts)+sW(r.works),0);
  expVal.textContent=fmt(total);
  expSub.textContent='\u0417\u0430\u043f\u0438\u0441\u0435\u0439: '+filtered.length;
}

// ── RECORDS RENDER ────────────────────────────────────────────────
// ── SEARCH & FILTER ───────────────────────────────────────────────
let searchQ='', filterType='';

function onSearch(v){
  searchQ=v.trim().toLowerCase();
  document.getElementById('search-clear').style.display=searchQ?'':'none';
  rAll();
}
function clearSearch(){
  searchQ='';
  document.getElementById('search-input').value='';
  document.getElementById('search-clear').style.display='none';
  rAll();
}
function setType(el,t){
  filterType=t;
  document.querySelectorAll('.ftype').forEach(b=>b.classList.remove('active'));
  el.classList.add('active');
  rAll();
}
function matchRecord(r){
  if(filterType && r.type!==filterType) return false;
  if(!searchQ) return true;
  const q=searchQ;
  if((r.type||'').toLowerCase().includes(q)) return true;
  if((r.mileage||'').toString().includes(q)) return true;
  if((r.date||'').toLowerCase().includes(q)) return true;
  if(fmtDate(r.date||'').includes(q)) return true;
  if((r.recommendations||'').toLowerCase().includes(q)) return true;
  for(const p of r.parts||[]){
    if((p.name||'').toLowerCase().includes(q)) return true;
    if((p.brand||'').toLowerCase().includes(q)) return true;
    if((p.article||'').toLowerCase().includes(q)) return true;
  }
  for(const w of r.works||[]){
    if((w.name||'').toLowerCase().includes(q)) return true;
  }
  return false;
}

// Подсветка совпадений в тексте
function hl(text, q){
  if(!q||!text) return esc(text||'');
  const safe=esc(text);
  const safeQ=q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&');
  return safe.replace(new RegExp('('+safeQ+')', 'gi'), '<mark class="hl">$1</mark>');
}

function srt(){return[...R].sort((a,b)=>{const ma=parseInt(a.mileage)||0,mb=parseInt(b.mileage)||0;if(mb!==ma)return mb-ma;return(b.date||'').localeCompare(a.date||'');});}

function rAll(){
  const isSearch = searchQ || filterType;
  // При активном поиске — раскрываем совпадения, при очистке — сворачиваем все
  const sorted = srt();
  if(isSearch){
    sorted.forEach(r=>{ if(matchRecord(r) && !r._open){ r._open=true; r._openedBySearch=true; } });
  } else {
    // Очистка поиска — сворачиваем записи которые были открыты только поиском
    sorted.forEach(r=>{ if(r._openedBySearch) { r._open=false; r._openedBySearch=false; } });
  }
  const filtered = sorted.filter(matchRecord);
  document.getElementById('rcnt').textContent='Записи \u00B7 '+R.length+(filtered.length!==R.length?' \u00B7 \u043d\u0430\u0439\u0434\u0435\u043d\u043e: '+filtered.length:'');
  const l=document.getElementById('rlist');
  if(!R.length){
    l.innerHTML='<div class="empty"><div style="font-size:40px;margin-bottom:12px">&#128295;</div><div>\u041f\u043e\u043a\u0430 \u043d\u0435\u0442 \u043d\u0438 \u043e\u0434\u043d\u043e\u0439 \u0437\u0430\u043f\u0438\u0441\u0438</div></div>';
    renderDash();return;
  }
  if(isSearch && !filtered.length){
    l.innerHTML='<div class="search-empty"><div class="search-empty-icon">&#128270;</div>\u041d\u0438\u0447\u0435\u0433\u043e \u043d\u0435 \u043d\u0430\u0439\u0434\u0435\u043d\u043e \u043f\u043e \u00AB'+esc(searchQ)+'\u00BB</div>';
    renderDash();return;
  }
  l.innerHTML=filtered.map(r=>card(r,searchQ)).join('');
  setTimeout(()=>document.querySelectorAll('.tdi-name').forEach(el=>autoH(el)),0);
  renderDash();
}
function fmtDate(d){if(!d)return'';const p=d.split('-');return p.length===3?p[2]+'.'+p[1]+'.'+p[0]:d;}
function bc(t){return t==='\u0422\u041e'?'bto':t==='\u0420\u0435\u043c\u043e\u043d\u0442'?'brem':'both';}
function card(r, q=''){
  const tot=sP(r.parts)+sW(r.works),op=r._open||false;
  return`<div class="rc" id="c${r.id}">
<div class="rh${op?' open':''}" onclick="tc(${r.id})">
  <div class="rh-left">
    <span class="badge ${bc(r.type)}">${r.type}</span>
    <span class="rh-mil">${r.mileage?parseInt(r.mileage).toLocaleString('ru-RU')+' \u043a\u043c':'— \u043a\u043c'}</span>
    <span class="rh-date">${fmtDate(r.date)}</span>
    ${r._saving?'<span class="rh-status" style="color:var(--muted)">\u25cf \u0441\u043e\u0445\u0440\u0430\u043d\u044f\u0435\u0442\u0441\u044f...</span>':''}

  </div>

    ${tot>0?'<span class="rh-total">'+fmt(tot)+'</span>':''}

</div>
<div class="rb${op?' open':''}" id="b${r.id}">
  <div class="fg">
    <div><label class="fl">\u0422\u0438\u043f \u0437\u0430\u043f\u0438\u0441\u0438</label>
      <select class="fs" onchange="upd(${r.id},'type',this.value)">
        ${['\u0422\u041e','\u0420\u0435\u043c\u043e\u043d\u0442','\u0414\u0438\u0430\u0433\u043d\u043e\u0441\u0442\u0438\u043a\u0430','\u0428\u0438\u043d\u043e\u043c\u043e\u043d\u0442\u0430\u0436','\u041f\u0440\u043e\u0447\u0435\u0435'].map(t=>'<option'+(r.type===t?' selected':'')+'>'+t+'</option>').join('')}
      </select></div>
    <div><label class="fl">\u041f\u0440\u043e\u0431\u0435\u0433, \u043a\u043c</label>
      <input class="fi" type="number" value="${esc(r.mileage)}" placeholder="227500" oninput="upd(${r.id},'mileage',this.value)"></div>
    <div><label class="fl">\u0414\u0430\u0442\u0430</label>
      <input class="fi" type="date" value="${r.date||''}" oninput="upd(${r.id},'date',this.value)"></div>
  </div>
  <div style="margin-bottom:20px">
    <div class="sl"><span class="sb"></span>\u0417\u0430\u043f\u0447\u0430\u0441\u0442\u0438</div>
    <div class="tw"><table>
      <thead><tr><th>\u041d\u0430\u0438\u043c\u0435\u043d\u043e\u0432\u0430\u043d\u0438\u0435</th><th>\u0411\u0440\u0435\u043d\u0434</th><th>\u0410\u0440\u0442\u0438\u043a\u0443\u043b</th><th>\u041a\u043e\u043b-\u0432\u043e</th><th>\u0426\u0435\u043d\u0430 \u0437\u0430 \u0448\u0442, &#8381;</th><th class="gold">\u0418\u0442\u043e\u0433\u043e, &#8381;</th><th></th></tr></thead>
      <tbody id="pt${r.id}">${r.parts.map(p=>pr(r.id,p,q)).join('')}</tbody>
    </table></div>
    <button class="smb" onclick="aP(${r.id})">+ \u0414\u043e\u0431\u0430\u0432\u0438\u0442\u044c \u0437\u0430\u043f\u0447\u0430\u0441\u0442\u044c</button>
    <div class="tsum" id="ps${r.id}">\u0418\u0442\u043e\u0433\u043e: <span>${fmt(sP(r.parts))}</span></div>
  </div>
  <div style="margin-bottom:20px">
    <div class="sl"><span class="sb"></span>\u0420\u0430\u0431\u043e\u0442\u044b</div>
    <div class="tw"><table>
      <thead><tr><th>\u041d\u0430\u0438\u043c\u0435\u043d\u043e\u0432\u0430\u043d\u0438\u0435 \u0440\u0430\u0431\u043e\u0442\u044b</th><th>\u041a\u043e\u043b-\u0432\u043e</th><th>\u0421\u0442\u043e\u0438\u043c\u043e\u0441\u0442\u044c, &#8381;</th><th></th></tr></thead>
      <tbody id="wt${r.id}">${r.works.map(w=>wr(r.id,w,q)).join('')}</tbody>
    </table></div>
    <button class="smb" onclick="aW(${r.id})">+ \u0414\u043e\u0431\u0430\u0432\u0438\u0442\u044c \u0440\u0430\u0431\u043e\u0442\u0443</button>
    <div class="tsum" id="ws${r.id}">\u0418\u0442\u043e\u0433\u043e: <span>${fmt(sW(r.works))}</span></div>
  </div>

  <div style="margin-top:16px">
    <label class="fl">\u0420\u0435\u043a\u043e\u043c\u0435\u043d\u0434\u0430\u0446\u0438\u0438 / \u0437\u0430\u043c\u0435\u0442\u043a\u0438</label>
    <textarea class="fta" placeholder="\u0420\u0435\u043a\u043e\u043c\u0435\u043d\u0434\u0443\u0435\u0442\u0441\u044f \u0437\u0430\u043c\u0435\u043d\u0438\u0442\u044c..." oninput="upd(${r.id},'recommendations',this.value)">${esc(r.recommendations)}</textarea>
  </div>
  <div class="btn-row">
    <button class="svbtn" onclick="mSave(${r.id})">\u0421\u043e\u0445\u0440\u0430\u043d\u0438\u0442\u044c</button>
    <button class="dupbtn" onclick="dupRec(${r.id})">\u0421\u043a\u043e\u043f\u0438\u0440\u043e\u0432\u0430\u0442\u044c</button>
    <button class="dlbtn" onclick="dRec(${r.id})">\u0423\u0434\u0430\u043b\u0438\u0442\u044c</button>
  </div>
</div></div>`;
}
function autoH(el){el.style.height='auto';el.style.height=el.scrollHeight+'px';}
function pr(rid,p,q=''){const tot=(parseFloat(p.price)||0)*(parseInt(p.qty)||0);
  const rowHl=q&&[(p.name||''),(p.brand||''),(p.article||'')].some(v=>v.toLowerCase().includes(q.toLowerCase()));
  return`<tr id="pr${p.id}"${rowHl?' class="hl-row"':''}>
    <td><textarea class="tdi tdi-name" rows="1" placeholder="\u041d\u0430\u0438\u043c\u0435\u043d\u043e\u0432\u0430\u043d\u0438\u0435..." oninput="uP(${rid},'${p.id}','name',this.value);autoH(this)">${esc(p.name)}</textarea></td>
    <td><input class="tdi" value="${esc(p.brand)}" placeholder="Mann" oninput="uP(${rid},'${p.id}','brand',this.value)"></td>
    <td><input class="tdi" value="${esc(p.article)}" placeholder="W712/75" oninput="uP(${rid},'${p.id}','article',this.value)"></td>
    <td><input class="tdi" type="number" style="text-align:center" value="${p.qty||1}" oninput="uP(${rid},'${p.id}','qty',this.value)"></td>
    <td><input class="tdi" type="number" style="text-align:right" value="${esc(p.price)}" placeholder="0" oninput="uP(${rid},'${p.id}','price',this.value)"></td>
    <td class="tdt" id="ptot${p.id}">${tot>0?tot.toLocaleString('ru-RU'):'—'}</td>
    <td><button class="ib" onclick="rP(${rid},'${p.id}')">&#10005;</button></td>
  </tr>`;}
function wr(rid,w,q=''){
  const rowHl=q&&(w.name||'').toLowerCase().includes(q.toLowerCase());
  return`<tr id="wr${w.id}"${rowHl?' class="hl-row"':''}>
    <td><textarea class="tdi tdi-name" rows="1" placeholder="\u041d\u0430\u0438\u043c\u0435\u043d\u043e\u0432\u0430\u043d\u0438\u0435 \u0440\u0430\u0431\u043e\u0442\u044b..." oninput="uW(${rid},'${w.id}','name',this.value);autoH(this)">${esc(w.name)}</textarea></td>
    <td><input class="tdi" type="number" style="text-align:center" value="${w.qty||1}" oninput="uW(${rid},'${w.id}','qty',this.value)"></td>
    <td><input class="tdi" type="number" style="text-align:right" value="${esc(w.price)}" placeholder="0" oninput="uW(${rid},'${w.id}','price',this.value)"></td>
    <td><button class="ib" onclick="rW(${rid},'${w.id}')">&#10005;</button></td>
  </tr>`;}

function tc(id){const r=gr(id);if(!r)return;r._open=!r._open;if(r._open)r._openedBySearch=false;rAll();}
function upd(id,f,v){const r=gr(id);if(!r)return;r[f]=v;r._unsaved=true;sch(id);renderDash();}
function uP(rid,pid,f,v){const r=gr(rid);if(!r)return;const p=r.parts.find(x=>String(x.id)===String(pid));if(!p)return;p[f]=v;r._unsaved=true;if(f==='price'||f==='qty'){const t=(parseFloat(p.price)||0)*(parseInt(p.qty)||0);const el=document.getElementById('ptot'+pid);if(el)el.textContent=t>0?t.toLocaleString('ru-RU'):'—';const se=document.querySelector('#ps'+rid+' span');if(se)se.textContent=fmt(sP(r.parts));}sch(rid);}
function uW(rid,wid,f,v){const r=gr(rid);if(!r)return;const w=r.works.find(x=>String(x.id)===String(wid));if(!w)return;w[f]=v;r._unsaved=true;if(f==='price'||f==='qty'){const se=document.querySelector('#ws'+rid+' span');if(se)se.textContent=fmt(sW(r.works));}sch(rid);}
function aP(rid){const r=gr(rid);if(!r)return;const p=nP();r.parts.push(p);r._unsaved=true;const tb=document.getElementById('pt'+rid);if(tb)tb.insertAdjacentHTML('beforeend',pr(rid,p));sch(rid);}
function rP(rid,pid){const r=gr(rid);if(!r)return;r.parts=r.parts.filter(p=>String(p.id)!==String(pid));r._unsaved=true;const el=document.getElementById('pr'+pid);if(el)el.remove();const se=document.querySelector('#ps'+rid+' span');if(se)se.textContent=fmt(sP(r.parts));sch(rid);}
function aW(rid){const r=gr(rid);if(!r)return;const w=nW();r.works.push(w);r._unsaved=true;const tb=document.getElementById('wt'+rid);if(tb)tb.insertAdjacentHTML('beforeend',wr(rid,w));sch(rid);}
function rW(rid,wid){const r=gr(rid);if(!r)return;r.works=r.works.filter(w=>String(w.id)!==String(wid));r._unsaved=true;const el=document.getElementById('wr'+wid);if(el)el.remove();sch(rid);}
function sch(id){clearTimeout(T[id]);const r=gr(id);if(r)r._saving=true;T[id]=setTimeout(()=>persist(id),900);}

async function init(){
  try{
    // Сначала грузим из localStorage для мгновенного отображения
    loadCFGLocal();
    document.documentElement.setAttribute('data-theme',CFG.theme||'dark');

    // Параллельно загружаем записи и настройки из Supabase
    const [records, remoteCFG] = await Promise.all([dbLoad(), dbLoadCFG()]);
    R = records;

    // Если в Supabase есть настройки — применяем и кешируем
    if(remoteCFG){
      CFG = remoteCFG;
      localStorage.setItem('vj_cfg', JSON.stringify(CFG));
      document.documentElement.setAttribute('data-theme', CFG.theme||'dark');
    }

    sb('\u25cf \u0421\u0438\u043d\u0445\u0440\u043e\u043d\u0438\u0437\u0438\u0440\u043e\u0432\u0430\u043d\u043e \u2713');
    document.getElementById('loading').style.display='none';
    document.getElementById('app').style.display='block';
    rAll();
  }catch(e){
    sb('\u25cf \u041e\u0448\u0438\u0431\u043a\u0430: '+e.message,true);
    document.getElementById('loading').innerHTML='<div style="color:#e74c3c;text-align:center;padding:40px">\u041e\u0448\u0438\u0431\u043a\u0430 \u043f\u043e\u0434\u043a\u043b\u044e\u0447\u0435\u043d\u0438\u044f.<br><small>'+e.message+'</small></div>';
  }
}

// ── PULL TO REFRESH ───────────────────────────────────────────────
(function(){
  const THRESHOLD = 80; // px для срабатывания
  const ptr = document.getElementById('ptr');
  const ptrText = document.getElementById('ptr-text');
  const ptrSpinner = document.getElementById('ptr-spinner');
  let startY = 0, pulling = false, refreshing = false, currentY = 0;

  function setPtrHeight(h){
    ptr.style.height = h + 'px';
    ptr.classList.toggle('visible', h > 0);
  }

  document.addEventListener('touchstart', e => {
    if(refreshing) return;
    if(window.scrollY === 0) {
      startY = e.touches[0].clientY;
      pulling = true;
    }
  }, {passive: true});

  document.addEventListener('touchmove', e => {
    if(!pulling || refreshing) return;
    currentY = e.touches[0].clientY;
    const dist = Math.max(0, currentY - startY);
    if(dist <= 0) return;
    // Сопротивление — тянем медленнее чем палец
    const h = Math.min(dist * 0.45, 60);
    setPtrHeight(h);
    ptrSpinner.classList.remove('spin');
    if(dist > THRESHOLD){
      ptrText.textContent = '\u041e\u0442\u043f\u0443\u0441\u0442\u0438\u0442\u0435 \u0434\u043b\u044f \u043e\u0431\u043d\u043e\u0432\u043b\u0435\u043d\u0438\u044f';
    } else {
      ptrText.textContent = '\u041f\u043e\u0442\u044f\u043d\u0438\u0442\u0435 \u0434\u043b\u044f \u043e\u0431\u043d\u043e\u0432\u043b\u0435\u043d\u0438\u044f';
    }
  }, {passive: true});

  document.addEventListener('touchend', async e => {
    if(!pulling || refreshing) return;
    pulling = false;
    const dist = currentY - startY;
    if(dist > THRESHOLD){
      // Запускаем обновление
      refreshing = true;
      setPtrHeight(52);
      ptrText.textContent = '\u041e\u0431\u043d\u043e\u0432\u043b\u0435\u043d\u0438\u0435...';
      ptrSpinner.classList.add('spin');
      try {
        await init();
        ptrText.textContent = '\u041e\u0431\u043d\u043e\u0432\u043b\u0435\u043d\u043e \u2713';
        setTimeout(()=>{ setPtrHeight(0); refreshing = false; }, 700);
      } catch(err) {
        ptrText.textContent = '\u041e\u0448\u0438\u0431\u043a\u0430 \u043e\u0431\u043d\u043e\u0432\u043b\u0435\u043d\u0438\u044f';
        setTimeout(()=>{ setPtrHeight(0); refreshing = false; }, 1200);
      }
    } else {
      // Не дотянули — прячем
      setPtrHeight(0);
    }
    startY = 0; currentY = 0;
  }, {passive: true});
})();

// Применяем тему сразу из localStorage (до загрузки из сети)
loadCFGLocal();
document.documentElement.setAttribute('data-theme', CFG.theme||'dark');
init();
</script>
